#ime workflowa
name: Test workflow

# Workflow se zažene ob vsakem pushu na branch master
on:
  push:
    branches: [ master ]

#definiranje job-sov
jobs:

#preverjanje testov
#ime prvega joba
  check-tests:

  #workflow ne teče na git serverju ampak na mojem računalniku
    runs-on: self-hosted

    #zaporedje korakov, ki se izvaja zaporedno
    steps:

    #prenese mojo kodo iz gitHub repozitorija na računalnik, kjer se bo workflow izvajal
    #ime koraka
      - name: Checkout code
        uses: actions/checkout@v4

      # Preveri ali obstaja testna datoteka (test.py)
      # Če ne obstaja → zapiše napako v napaka.txt
      # Če obstaja → ustvari prazno datoteko napaka.txt      
      - name: Check if tests exist
        shell: powershell
        run: |
          if (!(Test-Path "test.py")) {
            "Tests missing" | Out-File napaka.txt
          } else {
            "" | Out-File napaka.txt
          }

      #artefakt -> datoteka, ki jo en job shrani, da jo lahko drug job uporabi
      # Shrani napaka.txt kot artefakt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt


  #Poganjanje testov
  run-tests:

    runs-on: self-hosted

    # Ta job se zažene šele, ko se prvi uspešno zaključi
    needs: check-tests

    steps:

      # Ponovno prenese kodo
      - name: Checkout code
        uses: actions/checkout@v4

      # Prenese artefakt napaka.txt iz prvega joba
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka

      # Ustavi workflow če je napaka
      - name: Stop if error
        shell: powershell
        run: |
          if ((Get-Content napaka.txt).Length -gt 0) {
            Write-Output "Error detected"
            exit 1
          }

      #setup-python -> izognem se permission errorjem
      #namesti knjižnice (če obstaja requirements.txt)
      - name: Install dependencies
        shell: powershell
        run: |
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }

      #zažene teste
      - name: Run tests
        run: python test.py
