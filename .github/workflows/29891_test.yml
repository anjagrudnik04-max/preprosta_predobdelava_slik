# ime workflowa
name: Test workflow

# Workflow se zažene ob vsakem pushu na branch master
on:
  push:
    branches: [ master ]

jobs:
  # Prvi job: preveri ali testne datoteke obstajajo
  check-tests:
    runs-on: self-hosted
    steps:
      # Prenese kodo iz GitHub repozitorija
      - name: Checkout code
        uses: actions/checkout@v4

      # Preveri ali obstaja test.py, rezultat zapiše v napaka.txt
      - name: Check if tests exist
        shell: powershell
        run: |
          if (!(Test-Path "test.py")) {
            "Tests missing" | Out-File napaka.txt
          } else {
            "" | Out-File napaka.txt
          }

      # Shrani napaka.txt kot artefakt za naslednji job
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: napaka
          path: napaka.txt

  # Drugi job: pripravi okolje in požene teste z matrix
  run-tests:
    runs-on: self-hosted
    needs: check-tests
    # Matrix - požene teste na več verzijah Pythona
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      # Prenese kodo
      - name: Checkout code
        uses: actions/checkout@v4

      # Prenese artefakt iz prvega joba
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka

      # Ustavi workflow če napaka.txt ni prazna
      - name: Stop if error
        shell: powershell
        run: |
          if ((Get-Content napaka.txt).Length -gt 0) {
            Write-Output "Error detected"
            exit 1
          }

      # Nastavi Python verzijo iz matrix
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Namesti knjižnice iz requirements.txt
      - name: Install dependencies
        shell: powershell
        run: |
          if (Test-Path "requirements.txt") {
            pip install -r requirements.txt
          }

      # Požene teste
      - name: Run tests
        run: python test.py
