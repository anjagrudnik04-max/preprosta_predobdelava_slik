name: Deploy workflow

on:
  workflow_run:
    workflows: ["Test workflow"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      # Checkout kode
      - name: Checkout code
        uses: actions/checkout@v4

      # Download artifact (napaka.txt)
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: napaka
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Preveri napaka.txt
      - name: Check napaka.txt
        shell: powershell
        run: |
          if ((Get-Content napaka.txt).Length -gt 0) {
            Write-Output "Napaka.txt ni prazna - deploy se ustavi"
            exit 1
          }

      # Login DockerHub (FIXED!)
      - name: Login to DockerHub
        shell: powershell
        run: |
          $pass = "${{ secrets.DOCKER_PASSWORD }}".Trim()
          $pass | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/preprosta_predobdelava_slik:latest .

      # Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/preprosta_predobdelava_slik:latest
